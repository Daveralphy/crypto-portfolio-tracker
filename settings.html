<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Crypto Portfolio Tracker</title>
  <link rel="stylesheet" href="./src/css/styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar with CRYPTOVEAL -->
    <aside id="sidebar-container" class="sidebar"></aside>

    <!-- Main Content Area -->
    <div class="content-wrapper">
      <!-- Top Header with Menu & Theme Toggle -->
      <div id="header-container"></div>

      <main class="main-content">
        <!-- Settings Section -->
        <section class="settings-section">
          <div class="section-header">
            <h2>SETTINGS</h2>
          </div>

          <!-- Settings List -->
          <div class="settings-list">
            <!-- Theme Setting -->
            <div class="settings-row">
              <div class="settings-label">
                <h3>Theme</h3>
              </div>
              <div class="settings-control">
                <select id="theme-select" class="settings-select">
                  <option value="dark">Dark</option>
                  <option value="light">Light</option>
                </select>
              </div>
            </div>

            <!-- Currency Setting -->
            <div class="settings-row">
              <div class="settings-label">
                <h3>Currency</h3>
              </div>
              <div class="settings-control">
                <select id="settings-currency-select" class="settings-select">
                  <option value="USD">USD - US Dollar</option>
                  <option value="NGN">NGN - Nigerian Naira</option>
                  <option value="EUR">EUR - Euro</option>
                </select>
              </div>
            </div>

            <!-- Portfolio Reset Setting -->
            <div class="settings-row">
              <div class="settings-label">
                <h3>Portfolio Data</h3>
              </div>
              <div class="settings-control">
                <button id="reset-portfolio-btn" class="btn-reset-portfolio">
                  Reset Portfolio
                </button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- Load settings.js as ES module -->
  <script type="module" src="./src/js/settings.js"></script>
</body>
</html>
