<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History - Crypto Portfolio Tracker</title>
  <link rel="stylesheet" href="./src/css/styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar with CRYPTOVEAL -->
    <aside id="sidebar-container" class="sidebar"></aside>

    <!-- Main Content Area -->
    <div class="content-wrapper">
      <!-- Top Header with Menu & Theme Toggle -->
      <div id="header-container"></div>

      <main class="main-content">
        <!-- History Section -->
        <section class="assets-section">
          <div class="section-header">
            <h2>ACTIVITY HISTORY</h2>
          </div>
          <table class="history-table" id="history-table">
            <thead>
              <tr>
                <th class="col-action">ACTION</th>
                <th class="col-coin">COIN</th>
                <th class="col-amount">AMOUNT</th>
                <th class="col-price">PRICE</th>
                <th class="col-date">DATE</th>
              </tr>
            </thead>
            <tbody id="history-list">
              <tr class="no-data">
                <td colspan="5">No activity history yet.</td>
              </tr>
            </tbody>
          </table>
        </section>
      </main>
    </div>
  </div>

  <!-- Load history.js as ES module -->
  <script type="module" src="./src/js/history.js"></script>
</body>
</html>
