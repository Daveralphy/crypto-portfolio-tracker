<header class="header">
  <div class="header-title-section">
    <h1 class="header-title">LIVE MARKET</h1>
    <p class="header-subtitle">Last update: <span id="last-update">20 seconds ago</span></p>
  </div>
  <div class="header-search-wrapper">
    <input
      type="text"
      id="search-input"
      class="header-search-input"
      placeholder="SEARCH ASSET ID"
      autocomplete="off"
    >
    <button class="header-search-button"><svg class="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg></button>
  </div>
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
    <svg class="icon-theme" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
  </button>
</header>
